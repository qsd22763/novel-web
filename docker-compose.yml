version: '3.8'

services:
  moxiang-shuge:
    build: .
    container_name: moxiang-shuge
    ports:
      - "3000:3000"
    volumes:
      - app_data:/app/data  # 持久化 SQLite 数据库
    environment:
      - NODE_ENV=production
      - PORT=3000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

volumes:
  app_data:
    driver: local
