# EdgeOne Pages 部署配置
# 用于 Vue 3 + Vite SPA 项目

app: novel-frontend
framework: vite

# 构建配置
build:
  # 构建命令（EdgeOne Pages 会自动执行 npm install && npm run build）
  command: npm run build
  # 构建产物输出目录
  outputDir: dist

# 环境变量（构建时注入）
env:
  EDGEONE_PAGES: "true"

# SPA 路由配置 - 所有前端路由都回退到 index.html
# EdgeOne Pages 会自动处理 History 模式的 SPA 路由
routes:
  - handle: filesystem
  - handle: miss
    dest: /index.html

# 缓存策略
cache:
  # 静态资源长期缓存（带 hash 的文件）
  - path: /assets/*
    maxAge: 31536000
  # HTML 文件不缓存或短时间缓存
  - path: /index.html
    maxAge: 0
  # 其他资源
  - path: /*
    maxAge: 3600
